<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MatrixQuest: Hardened Core Engine</title>
    <style>
        body {
            background-color: #0f111a;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 35px rgba(0, 255, 204, 0.4);
            border: 6px solid #1f2335;
            background: #020205;
            border-radius: 4px;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        #ui-overlay {
            width: 512px;
            background: #0d0f18;
            color: #a9b1d6;
            box-sizing: border-box;
            padding: 12px;
            border-top: 4px solid #1f2335;
            display: grid; 
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn {
            background: #121424;
            color: #00ffcc;
            border: 3px solid #00ffcc;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            box-shadow: 2px 2px 0px #000;
        }

        .btn:hover {
            background: #24283b;
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px #000;
        }

        #dialogue-box {
            grid-column: span 2;
            background: #05060b;
            border: 2px solid #1f2335;
            padding: 10px;
            min-height: 58px;
            font-size: 13px;
            line-height: 1.4;
            font-weight: bold;
            color: #fff;
            white-space: pre-line;
        }

        #controls-legend {
            margin-top: 15px;
            color: #565f89;
            text-align: center;
            font-size: 13px;
            line-height: 1.6;
        }
    </style>
</head>

const SoundFX = {
    ctx: null,
    init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
    play(type) {
        this.init(); if (!this.ctx) return;
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination); const now = this.ctx.currentTime;
        switch(type) {
            case 'hit':
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(260, now); osc.frequency.exponentialRampToValueAtTime(30, now + 0.1);
                gain.gain.setValueAtTime(0.06, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(now); osc.stop(now + 0.1); break;
            case 'text':
                osc.type = 'triangle'; osc.frequency.setValueAtTime(380, now);
                gain.gain.setValueAtTime(0.02, now); gain.gain.exponentialRampToValueAtTime(0.005, now + 0.03); osc.start(now); osc.stop(now + 0.03); break;
            case 'heal':
                osc.type = 'sine'; osc.frequency.setValueAtTime(440, now); osc.frequency.setValueAtTime(554, now + 0.08); osc.frequency.setValueAtTime(659, now + 0.16);
                gain.gain.setValueAtTime(0.06, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(now); osc.stop(now + 0.3); break;
            case 'levelUp':
                osc.type = 'sine'; osc.frequency.setValueAtTime(523, now); osc.frequency.setValueAtTime(659, now + 0.1); osc.frequency.setValueAtTime(987, now + 0.2);
                gain.gain.setValueAtTime(0.06, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35); osc.start(now); osc.stop(now + 0.35); break;
        }
    }
};

class Monster {
    constructor(speciesName, level = 5) {
        const data = CORE_INDEX[speciesName];
        this.species = speciesName; this.name = data.name; this.type = data.type;
        this.level = level; this.color = data.color; this.moves = [...data.moves]; this.syncRate = data.syncRate;
        this.maxHp = Math.floor((data.baseHp * 2 * level) / 100) + level + 10; this.hp = this.maxHp;
        this.atk = Math.floor((data.baseAtk * 2 * level) / 100) + 5; this.def = Math.floor((data.baseDef * 2 * level) / 100) + 5;
        this.spd = Math.floor((data.baseSpd * 2 * level) / 100) + 5; this.exp = 0; this.expNeeded = Math.pow(this.level, 3);
        this.isOverclocked = false;
    }
    gainExp(amount) {
        this.exp += amount; let logString = ""; let levelsGained = [];
        while (this.exp >= this.expNeeded) {
            this.level++; this.expNeeded = Math.pow(this.level, 3); levelsGained.push(this.level);
            const data = CORE_INDEX[this.species]; const oldMax = this.maxHp;
            const hpGain = Math.max(1, Math.floor(oldMax * 0.05)); this.maxHp = oldMax + hpGain; this.hp += hpGain;
            this.atk = Math.floor((data.baseAtk * 2 * this.level) / 100) + 5; this.def = Math.floor((data.baseDef * 2 * this.level) / 100) + 5;
            this.spd = Math.floor((data.baseSpd * 2 * this.level) / 100) + 5;
            logString += `\n${this.name} expanded to Level ${this.level}!`;
            if (data.learnTable[this.level] !== undefined) {
                let targetMove = data.learnTable[this.level];
                if (!this.moves.includes(targetMove)) { this.moves.push(targetMove); logString += `\n[COMPILE SUCCESS]: Learned ${targetMove.toUpperCase()}!`; }
            }
        }
        return { log: logString, levelsGained };
    }
}

const Game = {
    canvas: document.getElementById("gameCanvas"),
    ctx: document.getElementById("gameCanvas").getContext("2d"),
    ui: document.getElementById("ui-overlay"),
    dialogue: document.getElementById("dialogue-box"),
    buttonsContainer: document.getElementById("menu-buttons"),
    
    gameState: "STARTER_SELECT", 
    battleSubState: "MAIN_MENU", keys: {}, inputLock: false,
    currentMapKey: "SECTOR_01", activeMap: null, dialogueQueue: [], currentSpeaker: "", activeInteractingNpc: null,
    playerParty: [], activePlayerMon: null, enemyMon: null, isBossBattle: false, activeBossSpecies: "",
    inventory: { "Nano-Repair": 5, "Link Card": 3, "Decrypt Key": 0, "Great Link": 0, "XP Candy": 0 }, linkDataFragments: 20, 
    tileSize: 32, playerGridPos: { x: 4, y: 5 }, pixelPos: { x: 4 * 32, y: 5 * 32 }, moveCooldown: 0, transitionTimer: 0,
    combatLogFeed: "",
    previousGameStateForRoster: null, rosterSubMode: "ITEMS", rosterSelectedItem: null, catchCount: 0,
    previousGameStateForXpInfo: null,

    init() {
        localStorage.removeItem("xenomon_save_profile");
        this.initStarterSelectionScreen();

        window.addEventListener("keydown", e => { 
            const blockedKeys = ["arrowup", "arrowdown", "arrowleft", "arrowright", " "];
            if (blockedKeys.includes(e.key.toLowerCase())) {
                e.preventDefault(); 
            }
            if (e.key === " " || e.key === "Enter") { this.processActionTrigger(); return; }
            this.keys[e.key.toLowerCase()] = true;
            if (e.key.toLowerCase() === "p" && this.gameState === "OVERWORLD") this.saveProfileToStorage();
            if (e.key.toLowerCase() === "v") this.toggleRosterView();
            if (e.key.toLowerCase() === "m") this.toggleXpInfoView();
        });
        window.addEventListener("keyup", e => { 
            this.keys[e.key.toLowerCase()] = false; 
        });
        this.loop();
    },

    initStarterSelectionScreen() {
        this.gameState = "STARTER_SELECT";
        this.dialogue.innerText = "=== SYSTEM DIAGNOSTIC: UNCLAIMED SQUAD REGISTRY ===\nSelect an identity core profile block to allocate your data stack loop:";
        this.buttonsContainer.innerHTML = "";
        this.createStarterSelectionOption("VOLTSNAP [PLASMA]", "Voltsnap");
        this.createStarterSelectionOption("GLITCHFOX [CYBER]", "Glitchfox");
        this.createStarterSelectionOption("ROOTCLASH [BIO]", "Rootclash");
    },

    createStarterSelectionOption(label, speciesKey) {
        const btn = document.createElement("div"); btn.className = "btn"; btn.innerText = label;
        btn.onclick = () => {
            this.playerParty = [new Monster(speciesKey, 5)]; this.activePlayerMon = this.playerParty[0];
            this.activeMap = MAP_DIRECTORY[this.currentMapKey];
            
            // FIXED: Synchronous reset order stops render-stalls completely
            this.buttonsContainer.innerHTML = ""; 
            this.gameState = "OVERWORLD";
            this.dialogue.innerText = "Mainframe Active. Ready for command logs.";
            
            SoundFX.play('levelUp'); 
            this.saveProfileToStorage();
            
            // ALERT BUFFER: Safely alerts user outside the canvas thread loop
            alert(`Core compilation link built with [${speciesKey.toUpperCase()}] successfully.`);
        };
        this.buttonsContainer.appendChild(btn);
    },

    saveProfileToStorage() {
        const saveState = {
            mapKey: this.currentMapKey, gridPos: this.playerGridPos, inventory: this.inventory, shards: this.linkDataFragments, catchCount: this.catchCount,
            party: this.playerParty.map(mon => ({ species: mon.species, level: mon.level, hp: mon.hp, exp: mon.exp, moves: mon.moves }))
        };
        localStorage.setItem("xenomon_save_profile", JSON.stringify(saveState)); SoundFX.play('heal');
    },

    loadProfileFromStorage() {
        const raw = localStorage.getItem("xenomon_save_profile");
        if (!raw) return false;
        try {
            const data = JSON.parse(raw);
            if (!data.party || !data.party.length || !data.mapKey) return false;
            this.currentMapKey = data.mapKey; this.playerGridPos = data.gridPos;
            this.pixelPos = { x: data.gridPos.x * this.tileSize, y: data.gridPos.y * this.tileSize };
            this.inventory = data.inventory; this.linkDataFragments = data.shards; this.catchCount = data.catchCount || 0;
            this.playerParty = data.party.map(pData => {
                let m = new Monster(pData.species, pData.level); m.hp = pData.hp; m.exp = pData.exp; m.moves = pData.moves; return m;
            });
            return true;
        } catch(e) { 
            return false; 
        }
    },

    toggleXpInfoView() {
        if (this.inputLock) return;
        const blockedStates = ["STARTER_SELECT", "GAME_OVER", "TRANSITION", "SELL_MENU", "ROSTER_VIEW"];
        if (blockedStates.includes(this.gameState)) return;
        if (this.gameState === "XP_INFO") {
            this.gameState = this.previousGameStateForXpInfo || "OVERWORLD";
            this.previousGameStateForXpInfo = null;
            if (this.gameState === "OVERWORLD") this.dialogue.innerText = "Mainframe Active. Ready for command logs.";
            if (this.gameState === "BATTLE") { this.initBattleUI(); }
            return;
        }
        this.previousGameStateForXpInfo = this.gameState;
        this.gameState = "XP_INFO";
        this.ui.style.display = "grid";
        this.dialogue.innerText = "=== XP BONUS LEDGER (M) ===\n" +
            "1) Base kill EXP is now x1.5 boosted.\n" +
            "2) Any level-up relays +10 EXP (per level) to every OTHER squad member.\n" +
            "3) Reaching Level 20 grants the WHOLE squad a +90 EXP milestone bonus.\n" +
            "4) XP Candy (buy from Splicer-Jack, 30F) grants +60 EXP directly via the V menu.";
        this.buttonsContainer.innerHTML = "";
        const closeBtn = document.createElement("div"); closeBtn.className = "btn"; closeBtn.style.gridColumn = "span 2"; closeBtn.innerText = "CLOSE (M)"; closeBtn.onclick = () => this.toggleXpInfoView(); this.buttonsContainer.appendChild(closeBtn);
    },

    toggleRosterView() {
        if (this.inputLock) return;
        const blockedStates = ["STARTER_SELECT", "GAME_OVER", "TRANSITION", "SELL_MENU", "XP_INFO"];
        if (blockedStates.includes(this.gameState)) return;
        if (this.gameState === "ROSTER_VIEW") {
            this.gameState = this.previousGameStateForRoster || "OVERWORLD";
            this.previousGameStateForRoster = null;
            if (this.gameState === "OVERWORLD") this.dialogue.innerText = "Mainframe Active. Ready for command logs.";
            if (this.gameState === "BATTLE") { this.initBattleUI(); } 
            return;
        }
        this.previousGameStateForRoster = this.gameState;
        this.gameState = "ROSTER_VIEW";
        this.rosterSubMode = "ITEMS"; this.rosterSelectedItem = null;
        this.ui.style.display = "grid";
        this.initRosterUI();
    },

    initRosterUI() {
        this.buttonsContainer.innerHTML = "";
        if (this.rosterSubMode === "ITEMS") {
            this.dialogue.innerText = "=== ITEM MATRIX ACCESS (V) ===\nSelect a package to route to a squad member:";
            const usableItems = ["Nano-Repair", "XP Candy"];
            usableItems.forEach(itemKey => {
                let count = this.inventory[itemKey] || 0;
                if (count > 0) { this.createMenuButton(`${itemKey} (${count})`, () => { this.rosterSubMode = "SELECT_TARGET"; this.rosterSelectedItem = itemKey; this.initRosterUI(); }); }
            });
            const closeBtn = document.createElement("div"); closeBtn.className = "btn"; closeBtn.innerText = "CLOSE (V)"; closeBtn.onclick = () => this.toggleRosterView(); this.buttonsContainer.appendChild(closeBtn);
        } else if (this.rosterSubMode === "SELECT_TARGET") {
            this.dialogue.innerText = `=== ROUTE ${this.rosterSelectedItem.toUpperCase()} ===\nChoose target squad member:`;
            this.playerParty.forEach((mon, index) => {
                let statusLabel = `(${mon.hp}/${mon.maxHp} HP)`;
                this.createPartyRosterButton(mon, index, statusLabel, () => this.applyRosterItemToTarget(index));
            });
            const backBtn = document.createElement("div"); backBtn.className = "btn"; backBtn.innerText = "<< CANCEL"; backBtn.onclick = () => { this.rosterSubMode = "ITEMS"; this.rosterSelectedItem = null; this.initRosterUI(); }; this.buttonsContainer.appendChild(backBtn);
        }
    },

    applyRosterItemToTarget(index) {
        const mon = this.playerParty[index]; const itemKey = this.rosterSelectedItem;
        if (!mon || !itemKey || (this.inventory[itemKey] || 0) <= 0) { this.rosterSubMode = "ITEMS"; this.initRosterUI(); return; }
        this.inventory[itemKey]--;
        if (itemKey === "Nano-Repair") {
            mon.hp = Math.min(mon.maxHp, mon.hp + 25);
            SoundFX.play('heal');

        } else if (this.battleSubState === "PARTY") {
            this.playerParty.forEach((mon, index) => { let statusLabel = mon === this.activePlayerMon ? "[ACTIVE]" : `(${mon.hp}/${mon.maxHp} HP)`; this.createPartyRosterButton(mon, index, statusLabel, () => { if (mon === this.activePlayerMon || mon.hp <= 0) return; this.executeActionTurnStack({ type: 'SWAP', index: index }); }); });
            this.createMenuButton("<< CANCEL", () => { this.battleSubState = "MAIN_MENU"; this.initBattleUI(); });
        }
    },

    createMenuButton(text, callback) { const btn = document.createElement("div"); btn.className = "btn"; btn.innerText = text; btn.onclick = () => { if (!this.inputLock) callback(); }; this.buttonsContainer.appendChild(btn); },
    createPartyRosterButton(mon, index, statusLabel, callback) { const btn = document.createElement("div"); btn.className = "btn"; btn.onclick = () => { if (!this.inputLock) callback(); };
        const title = document.createElement("div"); title.innerText = `${mon.name} Lv${mon.level} ${statusLabel}`;
        const barTrack = document.createElement("div"); barTrack.style.marginTop = "6px"; barTrack.style.height = "6px"; barTrack.style.background = "#1b1f35"; barTrack.style.position = "relative";
        const barFill = document.createElement("div"); const expRatio = Math.max(0, Math.min(1, mon.exp / mon.expNeeded)); barFill.style.height = "100%"; barFill.style.width = `${expRatio * 100}%`; barFill.style.background = "#ffd166";
        const barLabel = document.createElement("div"); barLabel.style.marginTop = "2px"; barLabel.style.fontSize = "9px"; barLabel.style.color = "#a9b1d6"; barLabel.innerText = `EXP ${mon.exp}/${mon.expNeeded}`;
        barTrack.appendChild(barFill); btn.appendChild(title); btn.appendChild(barTrack); btn.appendChild(barLabel); this.buttonsContainer.appendChild(btn); },
    executeActionTurnStack(playerAction) { this.inputLock = true; this.buttonsContainer.innerHTML = ""; const enemyMoveKey = this.enemyMon.moves[Math.floor(Math.random() * this.enemyMon.moves.length)]; const enemyAction = { type: 'MOVE', object: MOVES[enemyMoveKey] }; let queue = []; if (playerAction.type === 'ITEM' || playerAction.type === 'CAPTURE' || playerAction.type === 'SWAP' || playerAction.type === 'RUN') { queue = [{ entity: this.activePlayerMon, target: this.enemyMon, action: playerAction }, { entity: this.enemyMon, target: this.activePlayerMon, action: enemyAction }]; } else { if (this.activePlayerMon.spd >= this.enemyMon.spd) { queue = [{ entity: this.activePlayerMon, target: this.enemyMon, action: playerAction }, { entity: this.enemyMon, target: this.activePlayerMon, action: enemyAction }]; } else { queue = [{ entity: this.enemyMon, target: this.activePlayerMon, action: enemyAction }, { entity: this.activePlayerMon, target: this.enemyMon, action: playerAction }]; } } this.processQueueStep(queue, 0); },

    processQueueStep(queue, index) {
        if (index >= queue.length) { this.evaluateOverclockTriggers(); return; } const step = queue[index]; if (step.entity !== this.enemyMon) step.entity = this.activePlayerMon; if (step.target !== this.enemyMon) step.target = this.activePlayerMon; if (step.entity.hp <= 0 && step.action.type !== 'SWAP') { this.processQueueStep(queue, index + 1); return; }
        
        if (step.action.type === 'RUN') { this.terminateBattleScene(); }
        else if (step.action.type === 'SWAP') { this.activePlayerMon = this.playerParty[step.action.index]; this.combatLogFeed = `Signature swap execution. Appending: ${this.activePlayerMon.name}!`; this.dialogue.innerText = this.combatLogFeed; setTimeout(() => this.processQueueStep(queue, index + 1), 1400); }
        else if (step.action.type === 'ITEM') { this.inventory[step.action.name]--; this.activePlayerMon.hp = Math.min(this.activePlayerMon.maxHp, this.activePlayerMon.hp + 25); this.combatLogFeed = `Nano-Repair sequence initialized. +25 HP committed to ${this.activePlayerMon.name}.`; this.dialogue.innerText = this.combatLogFeed; setTimeout(() => this.processQueueStep(queue, index + 1), 1400); } 
        else if (step.action.type === 'CAPTURE') { this.inventory[step.action.name]--; if (this.isBossBattle) { this.combatLogFeed = `COMPILING FAILED: HOST NODE SECURITY LOCK ACTIVE. LINK INITIALIZATION UNRECOGNIZED.`; this.dialogue.innerText = this.combatLogFeed; setTimeout(() => this.processQueueStep(queue, index + 1), 1400); return; } let caught = step.action.name === 'Great Link' ? this.enemyMon.hp < 26 : Math.random() * 255 < ((3 * this.enemyMon.maxHp - 2 * this.enemyMon.hp) * this.enemyMon.syncRate) / (3 * this.enemyMon.maxHp); if (caught) { this.combatLogFeed = (step.action.name === 'Great Link' ? `Great Link engaged! ${this.enemyMon.name} was below the threshold and linked.` : `Core parsed cleanly! Linked ${this.enemyMon.name} variables to stack layout.`) + this.checkCatchMilestone(); this.dialogue.innerText = this.combatLogFeed; this.enemyMon.hp = this.enemyMon.maxHp; this.playerParty.push(this.enemyMon); this.saveProfileToStorage(); setTimeout(() => this.terminateBattleScene(), 1600); } else { this.combatLogFeed = step.action.name === 'Great Link' ? `Great Link threshold not met. ${this.enemyMon.name} resisted the link.` : `Link configuration package collision error. Anomaly structural boundaries retained.`; this.dialogue.innerText = this.combatLogFeed; setTimeout(() => this.processQueueStep(queue, index + 1), 1400); } }
        else if (step.action.type === 'MOVE') { 
            let move = step.action.object; let result = this.evaluateDamageCalculation(step.entity, step.target, move); 
            if (move.drains) { 
                let siphon = Math.floor(result.damage / 2); step.entity.hp = Math.min(step.entity.maxHp, step.entity.hp + siphon); 
                this.combatLogFeed = `${step.entity.name} used ${move.name}! ${result.log}\nSiphoned +${siphon} HP structural fragments.`;
            } else { 
                this.combatLogFeed = `${step.entity.name} used ${move.name}!\n${result.log}`; 
            }
            this.dialogue.innerText = this.combatLogFeed;
            if (step.target.hp <= 0) { setTimeout(() => { if (step.target === this.enemyMon) this.processMatchVictory(); else this.handleActiveFaintRouting(); }, 1400); return; }
            setTimeout(() => this.processQueueStep(queue, index + 1), 1400); 
        }
    },

    evaluateDamageCalculation(attacker, defender, move) { 
        let modifier = (TYPE_CHART[move.type] && TYPE_CHART[move.type][defender.type] !== undefined) ? TYPE_CHART[move.type][defender.type] : 1; 
        let baseDmg = Math.floor(((2 * attacker.level / 5 + 2) * move.power * (attacker.atk / defender.def)) / 50) + 2; 
        let finalDmg = Math.floor(baseDmg * modifier); if (attacker.isOverclocked) finalDmg = Math.floor(finalDmg * 1.5); 
        defender.hp = Math.max(0, defender.hp - finalDmg); 
        let logOut = `Dealt ${finalDmg} structural damage.`;
        if(modifier > 1) logOut += " [CRITICAL ELEMENTAL MODIFIER MULTIPLY]";
        if(modifier < 1 && move.type !== "Primal") logOut += " [TARGET BUFFER INSULATED BRUNT]";
        return { damage: finalDmg, log: logOut }; 
    },
    evaluateOverclockTriggers() { if (this.isBossBattle && this.activeBossSpecies === "A.E.G.I.S. Core" && !this.enemyMon.isOverclocked) { let ratio = this.enemyMon.hp / this.enemyMon.maxHp; if (ratio <= 0.40 && this.enemyMon.hp > 0) { this.enemyMon.isOverclocked = true; this.dialogue.innerText = "!!! CRITICAL LINK EMERGENCY !!!\nA.E.G.I.S. MAINCORE ENGAGING SYSTEM VOLTAGE OVERCLOCK! ATTACK SCALED BY 150%!"; setTimeout(() => { this.inputLock = false; this.initBattleUI(); }, 2200); return; } } this.inputLock = false; this.dialogue.innerText = "Select next command protocol instruction string:"; this.initBattleUI(); },
    handleActiveFaintRouting() { let alive = this.playerParty.find(m => m.hp > 0); if (alive) { this.inputLock = false; this.initBattleUI(); } else { this.processMatchFailure(); } },

    processMatchVictory() {
        if (this.isBossBattle && this.activeBossSpecies === "A.E.G.I.S. Core") { this.dialogue.innerText = "OVERSEER INTERCEPT TERMINATED!\nMainframe environmental structural system patch deployed."; this.buttonsContainer.innerHTML = ""; setTimeout(() => { this.gameState = "GAME_OVER"; this.dialogue.innerText = "PARADOX RECONCILED.\nThe Sub-Grid Slums have been saved permanently from deletion loops. Thank you for testing!"; localStorage.removeItem("xenomon_save_profile"); }, 3000); } 
        else {
            let shardPayout = Math.floor(this.enemyMon.level * (this.isBossBattle ? 10 : 4)); this.linkDataFragments += shardPayout; 
            let upgradeMessage = "";
            if (this.activeBossSpecies === "Null-Hound") { this.inventory["Decrypt Key"] = 1; upgradeMessage = "\n[MODULE PACK ACQUIRED]: Obtained DECRYPT KEY access parameters."; }
            this.dialogue.innerText = `${this.enemyMon.name} link dropped offline.\nHarvested +${shardPayout}F Shards from core structural scraps.${upgradeMessage}`;
            setTimeout(() => {
                let exp = this.enemyMon.level * 15 * 1.5; let result = this.activePlayerMon.gainExp(exp);
                let bonusLog = this.grantPartyLevelUpBonus(this.activePlayerMon, result.levelsGained);
                this.saveProfileToStorage();
                if (result.log !== "") { this.dialogue.innerText = result.log + bonusLog; setTimeout(() => this.terminateBattleScene(), 2500); } else { this.terminateBattleScene(); }
            }, 1400);
        }
    },

    processMatchFailure() { this.dialogue.innerText = "Stack overflow fatal warning! Connection arrays completely shattered."; this.playerParty = []; this.activePlayerMon = null; this.enemyMon = null; this.isBossBattle = false; this.activeBossSpecies = ""; this.inventory = { "Nano-Repair": 5, "Link Card": 3, "Decrypt Key": 0, "Great Link": 0, "XP Candy": 0 }; this.linkDataFragments = 20; this.currentMapKey = "SECTOR_01"; this.activeMap = null; this.playerGridPos = { x: 4, y: 5 }; this.pixelPos = { x: 4 * 32, y: 5 * 32 }; this.ui.style.display = "grid"; this.inputLock = false; localStorage.removeItem("xenomon_save_profile"); this.initStarterSelectionScreen(); },
    terminateBattleScene() { this.gameState = "OVERWORLD"; this.ui.style.display = "grid"; this.inputLock = false; this.enemyMon = null; this.isBossBattle = false; this.activeBossSpecies = ""; this.render(); },

    drawSelectionBackgroundLayout() {
        this.ctx.fillStyle = "#030408"; this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        this.ctx.strokeStyle = "rgba(0, 255, 204, 0.08)"; this.ctx.lineWidth = 1;
        for(let i=0; i<this.canvas.width; i+=16) { this.ctx.beginPath(); this.ctx.moveTo(i,0); this.ctx.lineTo(i,this.canvas.height); this.ctx.stroke(); }
        this.ctx.fillStyle = "rgba(0, 255, 204, 0.02)"; this.ctx.fillRect(40, 40, this.canvas.width - 80, this.canvas.height - 80);
    },

    render() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); 
        if (this.gameState === "STARTER_SELECT") {
            this.drawSelectionBackgroundLayout();
        } else if (this.gameState === "BATTLE") {
            this.drawBattleLayout();
        } else if (this.gameState === "OVERWORLD" || this.gameState === "TEXT_BOX" || this.gameState === "SHOP_MENU" || this.gameState === "TRANSITION" || this.gameState === "SELL_MENU") {
            this.drawTilemap();
        } else if (this.gameState === "ROSTER_VIEW") {
            if (this.previousGameStateForRoster === "BATTLE") this.drawBattleLayout(); else this.drawTilemap();
        } else if (this.gameState === "XP_INFO") {
            if (this.previousGameStateForXpInfo === "BATTLE") this.drawBattleLayout(); else this.drawTilemap();
        }

        if (this.gameState === "TRANSITION") { 
            let color = this.isBossBattle ? (this.activeBossSpecies === "A.E.G.I.S. Core" ? "0, 255, 204" : "153, 51, 255") : "0, 255, 204"; 
            this.ctx.fillStyle = `rgba(${color}, ${this.transitionTimer / 100})`; 
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height); 
        }
    }
};

document.addEventListener("DOMContentLoaded", () => {
    setTimeout(() => {
        Game.init();
    }, 50);
});
</script>
